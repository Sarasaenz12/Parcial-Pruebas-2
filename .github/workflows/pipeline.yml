name: Pipeline CI/CD RecargaYa

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  MIN_COVERAGE: "80"

jobs:
  tests-unitarios:
    name: Tests Unitarios TDD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Configurar Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: uv sync

      - name: Ejecutar tests unitarios con cobertura
        run: |
          uv run pytest tests/test_recarga.py \
            --cov=src/recarga \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            -v --tb=short

  tests-bdd:
    name: Tests BDD Gherkin
    runs-on: ubuntu-latest
    needs: tests-unitarios

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync

      - name: Ejecutar escenarios BDD
        run: |
          uv run pytest tests/features/ \
            -v --tb=short

  tests-seguridad:
    name: Tests de Seguridad
    runs-on: ubuntu-latest
    needs: tests-unitarios

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync

      - name: Ejecutar tests de seguridad
        run: |
          uv run pytest tests/security/ \
            -v --tb=short

  suite-completa:
    name: Suite Completa con Cobertura
    runs-on: ubuntu-latest
    needs:
      - tests-bdd
      - tests-seguridad

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync

      - name: Ejecutar todos los tests con cobertura unificada
        run: |
          uv run pytest \
            tests/test_recarga.py \
            tests/features/ \
            tests/security/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.MIN_COVERAGE }} \
            -v --tb=short

  tests-rendimiento:
    name: Tests de Rendimiento Locust
    runs-on: ubuntu-latest
    needs: suite-completa
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync

      - name: Levantar la API en background
        run: |
          uv run uvicorn src.api:app \
            --host 0.0.0.0 \
            --port 8000 &
          echo $! > /tmp/api.pid
          sleep 5

      - name: Verificar que la API responde
        run: |
          curl -f http://localhost:8000/health \
            || (echo "La API no responde en el puerto 8000" && exit 1)

      - name: Ejecutar prueba de carga con Locust
        run: |
          mkdir -p reports/locust
          uv run locust \
            -f tests/performance/locustfile.py \
            --headless \
            --users 30 \
            --spawn-rate 5 \
            --run-time 30s \
            --host http://localhost:8000 \
            --csv reports/locust/resultados \
            --exit-code-on-error 1

      - name: Verificar P95 menor a 300ms
        run: |
          python3 - <<'EOF'
          import csv, sys

          with open('reports/locust/resultados_stats.csv') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  if row['Name'] == 'Aggregated':
                      p95 = float(row['95%'])
                      print(f"P95: {p95:.1f}ms (maximo permitido: 300ms)")
                      if p95 > 300:
                          print(f"SLA VIOLADO: P95 {p95:.1f}ms supera el limite de 300ms")
                          sys.exit(1)
                      print("SLA cumplido correctamente")
          EOF

      - name: Detener la API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill $(cat /tmp/api.pid) 2>/dev/null || true
          fi

      - name: Guardar reporte de Locust
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-reporte
          path: reports/locust/
          retention-days: 14